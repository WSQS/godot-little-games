name: Deploy to Github Pages

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]
    workflow_dispatch:

jobs:
    export_web:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        name: Export Web

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # Android exports: set up Android SDK before running godot-export
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Export game
              id: export
              uses: firebelley/godot-export@v7.0.0
              with:
                  # Godot 4.6.1 Linux editor (headless not required by this action, but it downloads the Linux editor zip)
                  godot_executable_download_url: https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.6.1
                  # Export templates 4.6.1
                  godot_export_templates_download_url: https://downloads.godotengine.org/?flavor=stable&platform=templates&slug=export_templates.tpz&version=4.6.1
                  relative_project_path: ./
                  export_debug: true
                  archive_output: false
                  relative_export_path: dist

            - name: Verify Pages output
              run: |
                  ls -la dist
                  ls -la dist/Web
                  test -f dist/Web/index.html
                  ls -la dist/Android

            - name: Copy apk to root of Pages output
              run: |
                  cp dist/Android/*.apk dist/Web/

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: dist/Web

    deploy:
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        needs: export_web
        runs-on: ubuntu-latest
        name: Deploy to GitHub Pages

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
