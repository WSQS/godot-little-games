name: opencode-pr-metadata

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: opencode-pr-metadata-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-pr-metadata:
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'opencode-agent[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update PR title and body with opencode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            You are maintaining the metadata of this pull request.

            PR number: #${{ github.event.pull_request.number }}
            Repository: ${{ github.repository }}
            PR URL: ${{ github.event.pull_request.html_url }}

            Task:
            1. Inspect the PR title, body, commits, and diff.
            2. Rewrite the PR title to be clear, concise, and useful for reviewers.
            3. Rewrite the PR body using this structure:

               ## Summary
               - Briefly explain what changed.

               ## Changes
               - List the main implementation changes.

               ## Testing
               - Describe tests, checks, or say "Not run" if no evidence is found.

               ## Notes for Reviewers
               - Mention risk areas, migration notes, or anything reviewers should focus on.

            Rules:
            - Do not modify source code.
            - Do not create commits.
            - Do not open a new PR.
            - Do not post a normal review comment unless updating the title/body fails.
            - Actually update the current PR title and body using the GitHub API or gh CLI.
            - Keep the title under 72 characters when possible.
            - Preserve important information from the existing PR body.
